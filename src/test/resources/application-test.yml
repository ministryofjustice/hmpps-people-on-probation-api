server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

api:
  base:
    url:
      ndelius: "http://localhost:18091"

HMPPS_AUTH_URL: "http://localhost:18090/auth"
NDELIUS_API_CLIENT_ID: "ndelius-client"
NDELIUS_API_CLIENT_SECRET: "clientsecret"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

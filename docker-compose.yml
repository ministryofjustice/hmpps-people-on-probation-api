services:
  hmpps-people-on-probation-api:
    image: ghcr.io/ministryofjustice/hmpps-people-on-probation-api:latest
    networks:
      - hmpps
    container_name: hmpps-people-on-probation-api
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
    environment:
      - SERVER_PORT=8080
      - HMPPS_AUTH_URL=${HMPPS_AUTH_URL}
      - NDELIUS_API_URL=${NDELIUS_API_URL}
      - NDELIUS_API_CLIENT_ID=${NDELIUS_API_CLIENT_ID}
      - NDELIUS_API_CLIENT_SECRET=${NDELIUS_API_CLIENT_SECRET}
      - SPRING_PROFILES_ACTIVE=dev

  hmpps-auth:
    image: ghcr.io/ministryofjustice/hmpps-auth:latest
    networks:
      - hmpps
    container_name: hmpps-auth
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev
      - APPLICATION_AUTHENTICATION_UI_ALLOWLIST=0.0.0.0/0

networks:
  hmpps:
